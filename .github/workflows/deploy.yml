name: Build and Deploy dist to Production

on:
  push:
    branches:
      - main # или master, если основная ветка так называется

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build dist
        run: yarn build

      - name: Ensure REMOTE_PATH exists
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            mkdir -p "${{ secrets.REMOTE_PATH }}"

      - name: Create tarball of dist
        run: tar -czf dist.tar.gz -C . dist

      - name: Upload dist.tar.gz to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          source: dist.tar.gz
          target: /tmp
          overwrite: true

      - name: Extract dist contents into REMOTE_PATH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            set -e
            tar -xzf "/tmp/dist.tar.gz" -C "${{ secrets.REMOTE_PATH }}" --strip-components=1 --overwrite
            rm -f "/tmp/dist.tar.gz"